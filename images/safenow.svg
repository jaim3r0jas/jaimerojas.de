<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 145 100" width="145" height="100">
  <rect width="145" height="100" fill="#0E1014"/>

  <!-- Compact alarm button with Simpson eyes (left) -->
  <circle cx="32" cy="50" r="16" fill="#1E64F0" stroke="#fff" stroke-width="1.5"/>
  <circle cx="28" cy="48" r="2.5" fill="#fff" stroke="#000" stroke-width="0.8"/>
  <circle cx="28.5" cy="48" r="1.1" fill="#000"/>
  <circle cx="36" cy="48" r="2.5" fill="#fff" stroke="#000" stroke-width="0.8"/>
  <circle cx="36.5" cy="48" r="1.1" fill="#000"/>
  <path d="M 28 56 Q 32 58 36 56" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Wordmark, fits properly -->
  <text x="56" y="56" font-family="Arial Black, Helvetica, sans-serif" font-size="16" fill="#fff"
        font-weight="900" letter-spacing="-0.6">Safe<tspan fill="#1E64F0">Now</tspan></text>
