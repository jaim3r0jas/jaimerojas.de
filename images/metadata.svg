<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 145 100" width="145" height="100">
  <rect width="145" height="100" fill="#ffffff"/>

  <!-- Signature 2x2 grid mark -->
  <g transform="translate(20 36)">
    <rect x="0"  y="0"  width="12" height="12" rx="2" fill="#FF7A1A"/>
    <rect x="14" y="0"  width="12" height="12" rx="2" fill="#0E0E0E"/>
    <rect x="0"  y="14" width="12" height="12" rx="2" fill="#0E0E0E"/>
    <rect x="14" y="14" width="12" height="12" rx="2" fill="#22C55E"/>
  </g>

  <!-- Wordmark -->
  <text x="56" y="58" font-family="Arial Black, Helvetica, sans-serif" font-size="18" fill="#0E0E0E"
        font-weight="900" letter-spacing="-1">metadata</text>

  <!-- Simpsons accent: tiny eyes inside the orange grid square -->
  <circle cx="23" cy="41" r="1.5" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <circle cx="23.2" cy="41" r="0.7" fill="#000"/>
  <circle cx="29" cy="41" r="1.5" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <circle cx="29.2" cy="41" r="0.7" fill="#000"/>
</svg>
